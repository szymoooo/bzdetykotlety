<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8">
        <title>AUTO-SNIPER Report</title><style>
        body{background-color:#121212;color:#e0e0e0;font-family:'Courier New',monospace;padding:20px}
        h1{text-align:center;color:#00ffcc;text-shadow:0 0 10px #00ffcc;display:flex;align-items:center;justify-content:center;gap:15px}
        .logo{width:100px;height:100px;object-fit:contain;vertical-align:middle}
        .match-card{background:#1e1e1e;border:1px solid #333;margin-bottom:30px;padding:15px;border-radius:8px}
        .match-header{border-bottom:1px solid #333;padding-bottom:10px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
        .match-title{font-size:1.5em;font-weight:bold;color:#fff}
        .league-badge{background:#333;color:#fff;padding:2px 8px;border-radius:4px;font-size:0.8em;margin-right:10px}
        .ctx-data{font-size:0.9em;color:#aaa}
        .pos-badge{background:#1a3a2a;color:#00ff99;padding:2px 8px;border-radius:4px;font-size:0.8em;margin-left:8px}
        .tc-badge-T{background:#1a2a3a;color:#00ccff;padding:2px 8px;border-radius:4px;font-size:0.8em;margin-left:4px}
        .tc-badge-N{background:#2a1a1a;color:#ff6666;padding:2px 8px;border-radius:4px;font-size:0.8em;margin-left:4px}
        .under55-high{background:#1a3a1a;color:#00ff99;padding:2px 10px;border-radius:4px;font-size:0.85em;font-weight:bold;margin-left:8px;border:1px solid #00ff99}
        .under55-mid{background:#2a2a1a;color:#ffcc00;padding:2px 10px;border-radius:4px;font-size:0.85em;font-weight:bold;margin-left:8px;border:1px solid #ffcc00}
        .under55-low{background:#2a1a1a;color:#ff6666;padding:2px 10px;border-radius:4px;font-size:0.85em;font-weight:bold;margin-left:8px;border:1px solid #ff6666}
        .models-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px}
        .model-box{background:#252526;padding:10px;border-radius:5px;border:1px solid #333}
        .status-active{border:1px solid #00ff00;box-shadow:0 0 8px rgba(0,255,0,0.2)}
        .status-rejected{border:1px solid #444;opacity:0.7}
        .model-header{display:flex;justify-content:space-between;font-weight:bold;margin-bottom:8px}
        .score-high{color:#00ff00} .score-low{color:#ff4444}
        .win{color:#00ff00;font-weight:bold} .loss{color:#ff4444;font-weight:bold}
        .status-verified{color:#888;font-size:0.8em}
        table{width:100%;border-collapse:collapse;font-size:0.85em}
        th{text-align:left;color:#888;border-bottom:1px solid #444;padding:4px}
        td{padding:4px;border-bottom:1px solid #333}
        .pt-pos{color:#00ff00} .pt-neg{color:#ff4444} .pt-zero{color:#666}
        </style></head><body>
        <h1><img src="loga.png" alt="Logo" class="logo"> AUTO-SNIPER v28.4 (UNDER 5.5 HT Score)</h1>
        <p style="text-align:center;color:#666;">Próg: 70 pkt.</p><h2 style='text-align:center;color:#666'>Brak danych na dzisiaj.</h2></body></html>
