<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Analiza typów - z Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Twój istniejący CSS */
        :root{
            --bg:#f4f6f8; --card:#fff; --primary:#2563eb;
            --success:#16a34a; --success-dark:#059669;
            --danger:#dc2626; --border:#e5e7eb;
            --text:#111827; --muted:#6b7280;
        }
        /* ... reszta Twojego CSS ... */
        
        /* Dodatkowe style dla nawigacji miesięcznej */
        .month-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 10px;
            background: var(--card);
            border-radius: 12px;
            align-items: center;
        }
        .month-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
        }
        .month-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .month-btn.loading {
            opacity: 0.5;
            cursor: wait;
        }
        .sync-status {
            font-size: 12px;
            color: var(--muted);
            margin-left: auto;
        }
        .sync-status.online { color: var(--success); }
        .sync-status.offline { color: var(--danger); }
        
        .expandable-month {
            margin-bottom: 30px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .month-header {
            background: var(--bg);
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 18px;
        }
        .month-header:hover { background: #e5e7eb; }
        .month-content {
            display: none;
            padding: 15px;
        }
        .month-content.expanded { display: block; }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Analiza typów narożnych</h1>
    
    <!-- Status synchronizacji -->
    <div class="card" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span id="syncStatus" class="sync-status">🔍 Sprawdzanie połączenia...</span>
            </div>
            <div>
                <button class="btn-secondary" onclick="syncWithCloud()">☁️ Synchronizuj</button>
                <button class="btn-secondary" onclick="exportToJSON()">📥 Eksport JSON</button>
                <button class="btn-secondary" onclick="importFromJSON()">📤 Import JSON</button>
            </div>
        </div>
    </div>
    
    <!-- Nawigacja miesięczna -->
    <div class="month-nav" id="monthNav"></div>
    
    <!-- Formularz dodawania (Twój istniejący) -->
    <div class="card">
        <div class="form-grid">
            <input type="date" id="date">
            <input type="text" id="match" placeholder="Mecz">
            <select id="type">
                <option>Under 5.5 HT</option>
                <option>Over 3.5 HT</option>
                <option>Under 9.5 FT</option>
                <option>Over 9.5 FT</option>
                <option>?</option>
            </select>
            <input type="number" step="0.01" id="cornerv3" placeholder="Cornerv3">
            <input type="number" step="0.01" id="cornerv3a" placeholder="Cornerv3a">
            <input type="number" step="0.01" id="sniper" placeholder="SniperPro">
            <input type="number" step="0.01" id="auto" placeholder="AUTO-SNIPER">
        </div>
        <div class="actions">
            <button class="btn-primary" onclick="addMatch()">Dodaj</button>
            <button class="btn-secondary" onclick="loadCurrentMonth()">Odśwież</button>
        </div>
    </div>
    
    <!-- Kontener na mecze (grupowane miesiącami) -->
    <div id="matchesContainer"></div>
</div>

<script>
// ====== KONFIGURACJA SUPABASE ======
const SUPABASE_URL = 'https://TWOJ_PROJEKT.supabase.co';  // ZMIEŃ!
const SUPABASE_ANON_KEY = 'TWOJ_ANON_KEY';  // ZMIEŃ!
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====== ZMIENNE GLOBALNE ======
let currentMonth = new Date().toISOString().substring(0, 7); // '2026-05'
let availableMonths = new Set();
let cachedData = {}; // Cache dla miesięcy: { '2026-05': [matches], '2026-04': [matches] }
let isLoading = false;

// ====== FUNKCJE POMOCNICZE ======
function formatMonth(month) {
    const [year, monthNum] = month.split('-');
    const months = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 
                    'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];
    return `${months[parseInt(monthNum)-1]} ${year}`;
}

function showToast(msg) {
    // Twoja istniejąca funkcja toast
    const toast = document.createElement('div');
    toast.className = 'toast show';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ====== OPERACJE NA SUPABASE ======

// Pobierz wszystkie dostępne miesiące
async function loadAvailableMonths() {
    try {
        const { data, error } = await supabase
            .from('matches')
            .select('date')
            .order('date', { ascending: false });
        
        if(error) throw error;
        
        availableMonths.clear();
        data.forEach(m => {
            const month = m.date.substring(0, 7);
            availableMonths.add(month);
        });
        
        renderMonthNav();
        return availableMonths;
    } catch(e) {
        console.error('Błąd ładowania miesięcy:', e);
        showToast('❌ Błąd połączenia z bazą');
        return new Set();
    }
}

// Pobierz mecze dla konkretnego miesiąca
async function loadMonthData(month, forceRefresh = false) {
    if(!forceRefresh && cachedData[month]) {
        return cachedData[month];
    }
    
    try {
        const startDate = `${month}-01`;
        const endDate = `${month}-31`;
        
        const { data, error } = await supabase
            .from('matches')
            .select('*')
            .gte('date', startDate)
            .lte('date', endDate)
            .order('date', { ascending: false });
        
        if(error) throw error;
        
        cachedData[month] = data || [];
        return cachedData[month];
    } catch(e) {
        console.error(`Błąd ładowania ${month}:`, e);
        return [];
    }
}

// Dodaj nowy mecz
async function addMatchToSupabase(matchData) {
    try {
        const { data, error } = await supabase
            .from('matches')
            .insert([matchData])
            .select();
        
        if(error) throw error;
        
        // Odśwież cache dla odpowiedniego miesiąca
        const month = matchData.date.substring(0, 7);
        cachedData[month] = null; // Wymuś odświeżenie
        availableMonths.add(month);
        
        showToast('✅ Dodano mecz');
        return data[0];
    } catch(e) {
        console.error('Błąd dodawania:', e);
        showToast('❌ Błąd dodawania meczu');
        return null;
    }
}

// Aktualizuj wynik meczu
async function updateMatchResult(id, result, verified) {
    try {
        const { error } = await supabase
            .from('matches')
            .update({ result: result, verified: verified })
            .eq('id', id);
        
        if(error) throw error;
        
        // Odśwież cache
        Object.keys(cachedData).forEach(key => { cachedData[key] = null; });
        showToast('✅ Zaktualizowano wynik');
        return true;
    } catch(e) {
        console.error('Błąd aktualizacji:', e);
        showToast('❌ Błąd aktualizacji');
        return false;
    }
}

// Usuń mecz
async function deleteMatch(id) {
    if(!confirm('Usunąć mecz?')) return false;
    
    try {
        const { error } = await supabase
            .from('matches')
            .delete()
            .eq('id', id);
        
        if(error) throw error;
        
        // Odśwież wszystko
        cachedData = {};
        await loadAvailableMonths();
        await loadCurrentMonth();
        showToast('✅ Usunięto mecz');
        return true;
    } catch(e) {
        console.error('Błąd usuwania:', e);
        showToast('❌ Błąd usuwania');
        return false;
    }
}

// ====== RENDEROWANIE ======

function renderMonthNav() {
    const nav = document.getElementById('monthNav');
    const monthsArray = Array.from(availableMonths).sort().reverse();
    
    if(monthsArray.length === 0) {
        nav.innerHTML = '<div style="padding: 10px;">Brak danych. Dodaj pierwszy mecz!</div>';
        return;
    }
    
    nav.innerHTML = `
        <button class="month-btn ${currentMonth === 'all' ? 'active' : ''}" onclick="setCurrentMonth('all')">
            📊 Wszystkie (${monthsArray.length} mies.)
        </button>
        ${monthsArray.map(month => `
            <button class="month-btn ${currentMonth === month ? 'active' : ''}" onclick="setCurrentMonth('${month}')">
                ${formatMonth(month)} ${month === new Date().toISOString().substring(0, 7) ? '⭐' : ''}
            </button>
        `).join('')}
    `;
}

async function setCurrentMonth(month) {
    currentMonth = month;
    renderMonthNav();
    await loadCurrentMonth();
}

async function loadCurrentMonth() {
    if(isLoading) return;
    isLoading = true;
    
    const container = document.getElementById('matchesContainer');
    container.innerHTML = '<div class="card" style="text-align:center"><div class="loading-spinner"></div> Ładowanie danych...</div>';
    
    try {
        if(currentMonth === 'all') {
            // Załaduj wszystkie miesiące (rozwijane)
            const months = Array.from(availableMonths).sort().reverse();
            container.innerHTML = '';
            
            for(const month of months) {
                const matches = await loadMonthData(month);
                renderMonthGroup(month, matches, container);
            }
        } else {
            // Załaduj tylko wybrany miesiąc
            const matches = await loadMonthData(currentMonth);
            container.innerHTML = '';
            renderMonthGroup(currentMonth, matches, container, true);
        }
    } catch(e) {
        console.error(e);
        container.innerHTML = '<div class="card" style="color:red">❌ Błąd ładowania danych</div>';
    }
    
    isLoading = false;
}

function renderMonthGroup(month, matches, container, expanded = false) {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'expandable-month';
    
    const winRate = calculateWinRate(matches);
    
    groupDiv.innerHTML = `
        <div class="month-header" onclick="toggleMonth('${month}')">
            <span>
                📅 ${formatMonth(month)} 
                <span style="font-size:14px; color:var(--muted)">(${matches.length} meczów)</span>
                ${winRate !== null ? `<span style="font-size:14px; margin-left:10px;">🎯 ${winRate}% skuteczność</span>` : ''}
            </span>
            <span>${expanded ? '▼' : '▶'}</span>
        </div>
        <div class="month-content ${expanded ? 'expanded' : ''}" id="content-${month}">
            ${renderMatchesTable(matches)}
        </div>
    `;
    
    container.appendChild(groupDiv);
}

function renderMatchesTable(matches) {
    if(!matches.length) return '<p style="padding:20px;text-align:center">Brak meczów w tym miesiącu</p>';
    
    return `
        <table style="width:100%; border-collapse:collapse">
            <thead>
                <tr>
                    <th>Data</th><th style="text-align:left">Mecz</th><th>Typ</th>
                    <th>Cv3</th><th>Cv3a</th><th>Snp</th><th>AUTO</th>
                    <th>Sygnał</th><th>Wynik</th><th></th>
                </tr>
            </thead>
            <tbody>
                ${matches.map(m => renderMatchRow(m)).join('')}
            </tbody>
        </table>
    `;
}

function renderMatchRow(m) {
    const signal = getSignal(m.cornerv3, m.cornerv3a, m.sniper, m.auto_sniper);
    const signalHtml = signal === 'under' ? '🔵 UNDER 5.5' : '⚪ BRAK';
    
    return `
        <tr ${m.verified && m.result ? (isCorrect(m.type, m.result) ? 'class="verified"' : 'class="lost-row"') : ''}>
            <td>${m.date}</td>
            <td style="text-align:left;font-weight:600">${m.match}</td>
            <td>${m.type}</td>
            <td>${m.cornerv3 || '?'}</td>
            <td>${m.cornerv3a || '?'}</td>
            <td>${m.sniper || '?'}</td>
            <td>${m.auto_sniper || '?'}</td>
            <td>${signalHtml}</td>
            <td>${m.verified ? m.result : `<input type="number" id="result-${m.id}" style="width:60px" placeholder="wynik">`}</td>
            <td>${m.verified ? '✓' : `<button onclick="saveResult(${m.id})">✓</button>`}
                <button onclick="deleteMatch(${m.id})" style="background:#dc2626;color:#fff;margin-left:5px;">🗑</button>
            </td>
        </tr>
    `;
}

function getSignal(cv3, cv3a, sniper, autoVal) {
    if(cv3 < 4.0 && cv3a < 4.0 && autoVal < 5.5) return "under";
    return "none";
}

function isCorrect(type, result) {
    if(!type || type === "?") return null;
    if(type === "Over 3.5 HT") return result >= 4;
    if(type.startsWith("Over")) return result > parseFloat(type.match(/[\d.]+/)[0]);
    if(type.startsWith("Under")) return result < parseFloat(type.match(/[\d.]+/)[0]);
    return false;
}

function calculateWinRate(matches) {
    const verified = matches.filter(m => m.verified && m.result && m.type !== '?');
    if(verified.length === 0) return null;
    const wins = verified.filter(m => isCorrect(m.type, m.result)).length;
    return Math.round((wins / verified.length) * 100);
}

async function saveResult(id) {
    const input = document.getElementById(`result-${id}`);
    const result = parseFloat(input.value);
    if(isNaN(result)) return;
    
    await updateMatchResult(id, result, true);
    await loadCurrentMonth(); // Odśwież widok
}

function toggleMonth(month) {
    const content = document.getElementById(`content-${month}`);
    content.classList.toggle('expanded');
    const header = content.previousElementSibling;
    const arrow = header.querySelector('span:last-child');
    arrow.textContent = content.classList.contains('expanded') ? '▼' : '▶';
}

// ====== DODAWANIE MECZU ======
async function addMatch() {
    const matchData = {
        date: document.getElementById('date').value,
        match: document.getElementById('match').value,
        type: document.getElementById('type').value,
        cornerv3: parseFloat(document.getElementById('cornerv3').value) || null,
        cornerv3a: parseFloat(document.getElementById('cornerv3a').value) || null,
        sniper: parseFloat(document.getElementById('sniper').value) || null,
        auto_sniper: parseFloat(document.getElementById('auto').value) || null,
        verified: false
    };
    
    if(!matchData.date || !matchData.match) {
        showToast('❌ Wypełnij datę i nazwę meczu');
        return;
    }
    
    await addMatchToSupabase(matchData);
    
    // Wyczyść formularz
    document.getElementById('match').value = '';
    document.getElementById('cornerv3').value = '';
    document.getElementById('cornerv3a').value = '';
    document.getElementById('sniper').value = '';
    document.getElementById('auto').value = '';
    
    await loadAvailableMonths();
    await loadCurrentMonth();
}

// ====== SYNCHRONIZACJA I IMPORT ======
async function syncWithCloud() {
    showToast('🔄 Synchronizacja...');
    await loadAvailableMonths();
    await loadCurrentMonth();
    showToast('✅ Zsynchronizowano');
}

async function exportToJSON() {
    const allData = [];
    for(const month of availableMonths) {
        const data = await loadMonthData(month);
        allData.push(...data);
    }
    
    const blob = new Blob([JSON.stringify(allData, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `matches_backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast(`📥 Eksportowano ${allData.length} meczów`);
}

function importFromJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const matches = JSON.parse(ev.target.result);
            let added = 0;
            for(const match of matches) {
                await addMatchToSupabase(match);
                added++;
            }
            showToast(`✅ Zaimportowano ${added} meczów`);
            await loadAvailableMonths();
            await loadCurrentMonth();
        };
        reader.readAsText(file);
    };
    input.click();
}

// ====== INICJALIZACJA ======
document.getElementById('date').value = new Date().toISOString().split('T')[0];

(async function init() {
    await loadAvailableMonths();
    await loadCurrentMonth();
    
    // Aktualizuj status połączenia
    const statusSpan = document.getElementById('syncStatus');
    statusSpan.textContent = '☁️ Połączono z Supabase';
    statusSpan.className = 'sync-status online';
})();

window.toggleMonth = toggleMonth;
window.setCurrentMonth = setCurrentMonth;
window.saveResult = saveResult;
window.deleteMatch = deleteMatch;
</script>
</body>
</html>
